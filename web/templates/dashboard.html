<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Debug Analyst — Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xterm-addon-fit/0.8.0/xterm-addon-fit.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
<style>
  :root {
    --bg-deep: #0a0a0f; --bg-surface: #111118; --bg-elevated: #1a1a24;
    --bg-card: #15151f; --bg-input: #0d0d14; --border-dim: #1e1e2e;
    --border-active: #2a2a3e; --text-primary: #e8e6f0; --text-secondary: #8b89a0;
    --text-dim: #55536a; --text-bright: #fff; --accent-purple: #9f7aea;
    --accent-cyan: #22d3ee; --accent-green: #34d399; --accent-red: #f87171;
    --accent-yellow: #fbbf24; --accent-orange: #fb923c;
    --font-mono: 'JetBrains Mono', monospace; --font-sans: 'Instrument Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--bg-deep); color: var(--text-primary); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

  .app { display: flex; height: 100vh; }
  .panel { display: flex; flex-direction: column; overflow: hidden; }
  .panel-left { flex: 1; min-width: 0; border-right: 1px solid var(--border-dim); }
  .panel-right { flex: 1; min-width: 0; }

  .panel-header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--bg-elevated); border-bottom: 1px solid var(--border-dim); flex-shrink: 0; }
  .panel-header .badge { font-family: var(--font-mono); font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .panel-header .title { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .panel-left .panel-header .badge { background: var(--accent-purple); color: var(--bg-deep); }
  .panel-right .panel-header .badge { background: var(--accent-cyan); color: var(--bg-deep); }
  .panel-header .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .agent-feed { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .agent-feed::-webkit-scrollbar { width: 5px; }
  .agent-feed::-webkit-scrollbar-track { background: transparent; }
  .agent-feed::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }

  .event-item { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .msg-agent { background: var(--bg-card); border: 1px solid #9f7aea30; border-radius: 10px; overflow: hidden; }
  .msg-agent .msg-header { padding: 8px 14px; background: var(--bg-elevated); border-bottom: 1px solid var(--border-dim); font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 1px; }
  .msg-agent .msg-body { padding: 14px; font-size: 13px; line-height: 1.7; }
  .msg-agent .msg-body p { margin-bottom: 8px; }
  .msg-agent .msg-body strong { color: var(--text-bright); }
  .msg-agent .msg-body code { font-family: var(--font-mono); font-size: 12px; background: var(--bg-input); padding: 1px 5px; border-radius: 3px; color: var(--accent-cyan); }
  .msg-agent .msg-body pre { background: var(--bg-input); border: 1px solid var(--border-dim); border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
  .msg-agent .msg-body pre code { background: none; padding: 0; color: var(--accent-cyan); font-size: 12px; line-height: 1.6; }
  .msg-agent .msg-body ul,.msg-agent .msg-body ol { padding-left: 20px; margin: 6px 0; }

  .msg-command { background: var(--bg-input); border: 1px solid #22d3ee40; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 13px; }
  .msg-command .prompt { color: var(--accent-green); font-weight: 700; }
  .msg-command .cmd-text { color: var(--accent-cyan); flex: 1; }
  .msg-command .copy-btn { font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 3px 10px; border: 1px solid #22d3ee60; background: transparent; color: var(--accent-cyan); border-radius: 4px; cursor: pointer; transition: all 0.2s; }
  .msg-command .copy-btn:hover { background: var(--accent-cyan); color: var(--bg-deep); }

  .msg-status { font-family: var(--font-mono); font-size: 11px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; }
  .msg-status.info { color: var(--text-dim); }
  .msg-status.success { color: var(--accent-green); }
  .msg-status.warning { color: var(--accent-yellow); }
  .msg-status.error { color: var(--accent-red); }

  .msg-tool { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 14px; background: #22d3ee12; border: 1px solid #22d3ee30; color: var(--accent-cyan); }
  .msg-tool.success { background: #34d39912; border-color: #34d39930; color: var(--accent-green); }
  .msg-tool.error { background: #f8717112; border-color: #f8717130; color: var(--accent-red); }

  .msg-section { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 2px; padding: 8px 0 4px; border-bottom: 1px solid var(--border-dim); }
  .msg-thinking { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); font-style: italic; padding: 6px 12px; }
  .msg-thinking .spin { width: 12px; height: 12px; border: 2px solid #9f7aea40; border-top-color: var(--accent-purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .msg-verdict { border: 2px solid; border-radius: 10px; padding: 16px; text-align: center; }
  .msg-verdict.fixed { border-color: var(--accent-green); background: #34d39908; }
  .msg-verdict.failed { border-color: var(--accent-red); background: #f8717108; }
  .msg-verdict .verdict-status { font-family: var(--font-mono); font-size: 18px; font-weight: 800; }
  .msg-verdict.fixed .verdict-status { color: var(--accent-green); }
  .msg-verdict.failed .verdict-status { color: var(--accent-red); }
  .msg-verdict .verdict-reason { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

  .msg-step { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg-elevated); border-radius: 6px; border: 1px solid var(--border-dim); }
  .msg-step .step-num { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--accent-cyan); background: #22d3ee15; padding: 2px 8px; border-radius: 3px; }
  .msg-step .step-hint { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }

  .terminal-container { flex: 1; padding: 4px; background: #000; }
  .terminal-container .xterm { height: 100%; }

  .resize-handle { width: 4px; cursor: col-resize; background: var(--border-dim); transition: background 0.2s; flex-shrink: 0; }
  .resize-handle:hover,.resize-handle.active { background: var(--accent-cyan); }
</style>
</head>
<body>
<div class="app">
  <div class="panel panel-left" id="panelLeft">
    <div class="panel-header">
      <span class="badge">AGENT</span>
      <span class="title">PR Debug Analyst</span>
      <div class="status"><span class="status-dot"></span><span id="statusText">Connected</span></div>
    </div>
    <div class="agent-feed" id="agentFeed">
      <div class="msg-status info">Waiting for agent events...</div>
    </div>
  </div>
  <div class="resize-handle" id="resizeHandle"></div>
  <div class="panel panel-right" id="panelRight">
    <div class="panel-header">
      <span class="badge">TERMINAL A</span>
      <span class="title">Project Terminal</span>
      <div class="status"><span class="status-dot" id="termDot"></span><span id="termStatus">Watching log file</span></div>
    </div>
    <div class="terminal-container" id="terminalContainer"></div>
  </div>
</div>
<script>
// xterm.js setup
const term = new Terminal({
  fontFamily: "'JetBrains Mono', monospace", fontSize: 13, lineHeight: 1.4,
  theme: { background:'#0a0a0f', foreground:'#e8e6f0', cursor:'#22d3ee', selectionBackground:'#9f7aea40',
    black:'#1a1a24', red:'#f87171', green:'#34d399', yellow:'#fbbf24', blue:'#60a5fa',
    magenta:'#9f7aea', cyan:'#22d3ee', white:'#e8e6f0', brightBlack:'#55536a',
    brightRed:'#fca5a5', brightGreen:'#6ee7b7', brightYellow:'#fde68a', brightBlue:'#93c5fd',
    brightMagenta:'#c4b5fd', brightCyan:'#67e8f9', brightWhite:'#ffffff' },
  cursorBlink: true, cursorStyle: 'bar', scrollback: 5000
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminalContainer'));
fitAddon.fit();
window.addEventListener('resize', () => fitAddon.fit());
term.writeln('\x1b[36m PR Debug Analyst — Terminal A Output\x1b[0m');
term.writeln('\x1b[2m Waiting for terminal data...\x1b[0m\r\n');

// Socket.IO
const socket = io();
const feed = document.getElementById('agentFeed');
let thinkingEl = null;

socket.on('connect', () => { document.getElementById('statusText').textContent = 'Connected'; });
socket.on('disconnect', () => { document.getElementById('statusText').textContent = 'Disconnected'; });
socket.on('terminal_output', (data) => { term.write(data.content); document.getElementById('termStatus').textContent = 'Streaming'; });

socket.on('agent_event', (event) => {
  const { event_type, data } = event;
  if (event_type !== 'thinking_start' && event_type !== 'spinner_start' && thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  switch (event_type) {
    case 'agent_message': addAgentMessage(data.content); break;
    case 'command': addCommand(data.command); break;
    case 'commands': (data.commands || []).forEach(cmd => addCommand(cmd)); break;
    case 'section': addSection(data.title); break;
    case 'thinking_start': case 'spinner_start': addThinking(data.topic || data.message || 'thinking...'); break;
    case 'spinner_done': if(thinkingEl){thinkingEl.remove();thinkingEl=null;} addStatus('success', '\u2713 '+(data.message||'')+' \u2014 '+(data.label||'done')); break;
    case 'tool_use': addToolBadge(data.name, data.detail, 'active'); break;
    case 'tool_result': addToolBadge(data.name, data.detail, data.status); break;
    case 'info': addStatus('info', data.message); break;
    case 'success': addStatus('success', '\u2713 '+data.message); break;
    case 'warning': addStatus('warning', '\u26A0 '+data.message); break;
    case 'error': addStatus('error', '\u2717 '+data.message); break;
    case 'step': addStep(data.step_num); break;
    case 'verdict': addVerdict(data.verdict, data.reason); break;
    default: if(data.message) addStatus('info','['+event_type+'] '+data.message);
  }
  feed.scrollTop = feed.scrollHeight;
});

function esc(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
function addAgentMessage(content) {
  const el=document.createElement('div'); el.className='event-item msg-agent';
  const header=document.createElement('div'); header.className='msg-header'; header.textContent='Agent Response';
  const body=document.createElement('div'); body.className='msg-body';
  body.innerHTML = DOMPurify.sanitize(marked.parse(content));
  el.appendChild(header); el.appendChild(body); feed.appendChild(el);
}
function addCommand(cmd) {
  const el=document.createElement('div'); el.className='event-item msg-command';
  const prompt=document.createElement('span'); prompt.className='prompt'; prompt.textContent='$';
  const txt=document.createElement('span'); txt.className='cmd-text'; txt.textContent=cmd;
  const btn=document.createElement('button'); btn.className='copy-btn'; btn.textContent='COPY';
  btn.onclick=function(){navigator.clipboard.writeText(cmd).then(()=>{btn.textContent='\u2713';setTimeout(()=>{btn.textContent='COPY'},1500)})};
  el.appendChild(prompt); el.appendChild(txt); el.appendChild(btn); feed.appendChild(el);
}
function addSection(title) { const el=document.createElement('div'); el.className='event-item msg-section'; el.textContent=title; feed.appendChild(el); }
function addStatus(type, message) { const el=document.createElement('div'); el.className='event-item msg-status '+type; el.textContent=message; feed.appendChild(el); }
function addToolBadge(name, detail, status) {
  const el=document.createElement('div'); el.className='event-item msg-tool'+(status==='success'?' success':status==='error'?' error':'');
  const icon=status==='success'?'\u2713':status==='error'?'\u2717':'\u2B21';
  el.textContent=icon+' '+name+(detail?' '+detail:''); feed.appendChild(el);
}
function addThinking(topic) { if(thinkingEl)thinkingEl.remove(); thinkingEl=document.createElement('div'); thinkingEl.className='event-item msg-thinking'; const s=document.createElement('div'); s.className='spin'; thinkingEl.appendChild(s); thinkingEl.appendChild(document.createTextNode(' '+topic)); feed.appendChild(thinkingEl); }
function addStep(num) { const el=document.createElement('div'); el.className='event-item msg-step'; const n=document.createElement('span'); n.className='step-num'; n.textContent='STEP '+num; const h=document.createElement('span'); h.className='step-hint'; h.textContent='enter \u00B7 done \u00B7 fail \u00B7 quit'; el.appendChild(n); el.appendChild(h); feed.appendChild(el); }
function addVerdict(verdict, reason) { const f=verdict==='BUILD_FIXED'; const el=document.createElement('div'); el.className='event-item msg-verdict '+(f?'fixed':'failed'); const s=document.createElement('div'); s.className='verdict-status'; s.textContent=(f?'\u2705':'\u274C')+' '+verdict; const r=document.createElement('div'); r.className='verdict-reason'; r.textContent=reason||''; el.appendChild(s); el.appendChild(r); feed.appendChild(el); }

// Panel resize
const handle=document.getElementById('resizeHandle'), left=document.getElementById('panelLeft'), right=document.getElementById('panelRight');
let isResizing=false;
handle.addEventListener('mousedown',()=>{isResizing=true;handle.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none'});
document.addEventListener('mousemove',(e)=>{if(!isResizing)return;const w=document.querySelector('.app').offsetWidth;const lw=Math.max(300,Math.min(e.clientX,w-300));left.style.flex='none';left.style.width=lw+'px';right.style.flex='1';fitAddon.fit()});
document.addEventListener('mouseup',()=>{if(isResizing){isResizing=false;handle.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';fitAddon.fit()}});
</script>
</body>
</html>
